name: CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y clang-format g++ make
      
      - name: Check Formatting
        run: make check
        
      - name: Run Tests
        run: make test
